name: Weekly Automation Pipeline

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: [self-hosted, windows]

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      MODEL: ${{ secrets.MODEL }}
      OPENROUTER_URL: ${{ secrets.OPENROUTER_URL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Stage 1
        shell: powershell
        run: python stage1_code.py

      - name: Run Stage 2
        shell: powershell
        run: python stage2_code.py

      - name: Run Stage 3
        shell: powershell
        run: python stage3_code.py

      - name: Commit and Push Outputs
        if: always()
        shell: powershell
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add OUTPUT_STAGE1/ OUTPUT_STAGE2/ OUTPUT_STAGE3/
          git commit -m "Update pipeline outputs" 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No changes to commit"
          } else {
            git push
          }
