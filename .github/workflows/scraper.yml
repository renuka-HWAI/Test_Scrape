name: Weekly Automation Pipeline

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      MODEL: ${{ secrets.MODEL }}
      OPENROUTER_URL: ${{ secrets.OPENROUTER_URL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl unzip gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Install matching ChromeDriver
        run: |
          CHROME_VERSION=$(google-chrome --product-version)
          CHROME_MAJOR=$(echo "$CHROME_VERSION" | cut -d'.' -f1)
          DRIVER_VERSION=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/LATEST_RELEASE_$CHROME_MAJOR")
          wget -O /tmp/chromedriver.zip "https://storage.googleapis.com/chrome-for-testing-public/$DRIVER_VERSION/linux64/chromedriver-linux64.zip"
          unzip -o /tmp/chromedriver.zip -d /tmp/
          sudo mv /tmp/chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          chromedriver --version

      - name: Run Stage 1
        run: python stage1_code.py

      - name: Run Stage 2
        run: python stage2_code.py

      - name: Run Stage 3
        run: python stage3_code.py

      - name: Commit and Push Outputs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add OUTPUT_STAGE1/ OUTPUT_STAGE2/ OUTPUT_STAGE3/
          git commit -m "Update pipeline outputs" || echo "No changes to commit"
          git push
