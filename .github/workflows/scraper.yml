name: Weekly Automation Pipeline

on:
  schedule:
    # Every Monday at 04:00 UTC (09:30 AM IST)
    - cron: "0 4 * * 1"

  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      MODEL: ${{ secrets.MODEL }}
      OPENROUTER_URL: ${{ secrets.OPENROUTER_URL }}

    steps:

      # Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Install Chrome (needed for Selenium)
      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # Run Stage 1
      - name: Run Stage 1
        run: python stage1.py

      # Run Stage 2
      - name: Run Stage 2
        run: python stage2.py

      # Run Stage 3
      - name: Run Stage 3
        run: python stage3.py

      # Commit outputs (CRITICAL for persistence)
      - name: Commit and Push Outputs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add .
          git commit -m "Update pipeline outputs" || echo "No changes to commit"

          git push
