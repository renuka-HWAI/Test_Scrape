name: Weekly Scraper

on:
  schedule:
    - cron: '30 4 * * 1'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python scraper.py

      - name: Commit checkpoint and output
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add checkpoint.json output.txt
          git commit -m "Update checkpoint and data" || echo "No changes"
          git push
